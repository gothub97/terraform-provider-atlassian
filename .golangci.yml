linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - revive
    - gofmt
    - gosimple
    - unused
    - ineffassign
    - misspell
    - bodyclose
    - nilerr

linters-settings:
  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
      - name: blank-imports
      - name: context-as-argument
      - name: error-return
      - name: error-strings
      - name: increment-decrement
      - name: var-naming
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow

  errcheck:
    check-type-assertions: true

  govet:
    enable-all: true
    disable:
      - fieldalignment

run:
  timeout: 5m
